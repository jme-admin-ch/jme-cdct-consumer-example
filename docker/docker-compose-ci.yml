# CI overlay for docker-compose. This file is used to override the default docker-compose.yml file in CI

services:

  pact-broker:
    ports: !reset [ ]
    environment:
      PACT_BROKER_BASE_URL: http://pact-broker:9292

networks:
  default:
    external: true
    # Network is created by the CI job and includes the test runner & the containers started by this compose file
    name: ${COMPOSE_PROJECT_NAME}_default
